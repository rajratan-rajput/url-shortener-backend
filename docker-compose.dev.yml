# Local development overrides. Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      NODE_ENV: development
      ENABLE_SWAGGER: "true"
      MONGO_URI: mongodb://${MONGO_ROOT_USERNAME:-admin}:${MONGO_ROOT_PASSWORD:-changeme}@mongo:27017/${MONGO_DATABASE:-urlshortener}?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379
    volumes:
      - ./src:/app/src:ro

  mongo:
    ports:
      - "27017:27017"

  redis:
    ports:
      - "6379:6379"
